spring:
  application:
    name: sctec-empreendimentos

  datasource:
    url: jdbc:sqlite:./data/sctec-empreendimentos.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    sql-migration-separator: _

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /api/doc
  api-docs:
    path: /api/doc/openapi

logging:
  level:
    com.sctec.empreendimentos: DEBUG
    org.springframework.security: INFO
